<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon texte</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; max-width: 900px; }
    h1 { margin-bottom: 8px; }
    .status { color: #0a7a2f; margin-bottom: 10px; }
    textarea {
      width: 100%;
      min-height: 260px;
      font-size: 16px;
      padding: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      resize: vertical;
    }
    .row { margin-top: 10px; display: flex; gap: 8px; }
    button { padding: 10px 14px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Écris ici</h1>
  <div id="status" class="status">Prêt</div>

  <textarea id="editor" placeholder="Écris ce que tu veux..."></textarea>

  <div class="row">
    <button id="downloadBtn" type="button">Télécharger mon texte</button>
    <button id="clearBtn" type="button">Effacer</button>
  </div>

  <script>
    const STORAGE_KEY = "mon_texte_auto_v1";
    const editor = document.getElementById("editor");
    const status = document.getElementById("status");
    const downloadBtn = document.getElementById("downloadBtn");
    const clearBtn = document.getElementById("clearBtn");

    // Charger au démarrage
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved !== null) editor.value = saved;

    let t;
    function setStatus(msg) {
      status.textContent = msg;
      clearTimeout(t);
      t = setTimeout(() => status.textContent = "Prêt", 1200);
    }

    // Sauvegarde auto à chaque frappe
    editor.addEventListener("input", () => {
      localStorage.setItem(STORAGE_KEY, editor.value);
      setStatus("Sauvegardé automatiquement ✅");
    });

    // Sécurité avant fermeture
    window.addEventListener("beforeunload", () => {
      localStorage.setItem(STORAGE_KEY, editor.value);
    });

    // Télécharger en .txt
    downloadBtn.addEventListener("click", () => {
      const blob = new Blob([editor.value], { type: "text/plain;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "mon-texte.txt";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
      setStatus("Fichier téléchargé ✅");
    });

    // Effacer
    clearBtn.addEventListener("click", () => {
      editor.value = "";
      localStorage.removeItem(STORAGE_KEY);
      setStatus("Texte effacé");
    });
  </script>
</body>
</html>
