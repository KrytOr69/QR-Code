<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Page Personnalisée</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .controls {
            margin-bottom: 30px;
            text-align: center;
        }

        .file-input-label {
            display: inline-block;
            padding: 12px 24px;
            background-color: #007AFF;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .file-input-label:hover {
            background-color: #0051D5;
        }

        input[type="file"] {
            display: none;
        }

        .smartphone-frame {
            /* Dimensions du smartphone */
            width: 375px;
            height: 812px;
            border: 12px solid #000;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* Encoche du smartphone (notch) */
        .smartphone-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background-color: #000;
            border-radius: 0 0 30px 30px;
            z-index: 10;
        }

        .screen-content {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-color: #ccc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Overlay semi-transparent pour meilleure lisibilité du texte */
        .screen-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 1;
            pointer-events: none;
        }

        .text-container {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            max-width: 90%;
        }

        p {
            color: white;
            font-size: 16px;
            line-height: 1.5;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            word-wrap: break-word;
            white-space: normal;
            overflow-wrap: break-word;
        }

        /* Style pour éditer facilement */
        .editable {
            cursor: text;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .editable:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 480px) {
            .smartphone-frame {
                width: 100vw;
                height: 100vh;
                border: none;
                border-radius: 0;
            }

            .smartphone-frame::before {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="controls">
        <label class="file-input-label">
            📸 Changer l'image
            <input type="file" id="imageInput" accept="image/*">
        </label>
    </div>

    <div class="smartphone-frame">
        <div class="screen-content" id="screenContent">
            <div class="text-container">
                <p contenteditable="true" class="editable">Votre texte ici. Double-cliquez pour modifier !</p>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const screenContent = document.getElementById('screenContent');
        const p = document.querySelector('p');

        // Charger le texte sauvegardé
        if (localStorage.getItem('texte')) {
            p.textContent = localStorage.getItem('texte');
        }

        // Charger l'image sauvegardée
        if (localStorage.getItem('imageData')) {
            screenContent.style.backgroundImage = `url('${localStorage.getItem('imageData')}')`;
        }

        // Gestion du changement d'image
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imageData = event.target.result;
                    screenContent.style.backgroundImage = `url('${imageData}')`;
                    // Sauvegarde l'image en local
                    localStorage.setItem('imageData', imageData);
                };
                reader.readAsDataURL(file);
            }
        });

        // Sauvegarder le texte quand vous modifiez
        p.addEventListener('blur', () => {
            localStorage.setItem('texte', p.textContent);
        });
    </script>
</body>
</html>
