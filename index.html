<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Page Personnalisée</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
        }

        .smartphone-frame {
            /* Dimensions du smartphone */
            width: 375px;
            height: 812px;
            border: 12px solid #000;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* Encoche du smartphone (notch) */
        .smartphone-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background-color: #000;
            border-radius: 0 0 30px 30px;
            z-index: 10;
        }

        .screen-content {
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1557672172-298e090d0f80?w=400&h=800&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        /* Overlay semi-transparent pour meilleure lisibilité du texte */
        .screen-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .text-container {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 90%;
        }

        h1 {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            word-wrap: break-word;
        }

        p {
            color: white;
            font-size: 16px;
            line-height: 1.5;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            word-wrap: break-word;
        }

        /* Style pour éditer facilement */
        .editable {
            cursor: text;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .editable:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 480px) {
            .smartphone-frame {
                width: 100vw;
                height: 100vh;
                border: none;
                border-radius: 0;
            }

            .smartphone-frame::before {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="smartphone-frame">
        <div class="screen-content">
            <div class="text-container">
                <h1 contenteditable="true" class="editable">Votre Titre</h1>
                <p contenteditable="true" class="editable">Votre texte ici. Double-cliquez pour modifier !</p>
            </div>
        </div>
    </div>

    <script>
        // Sauvegarde automatique du texte dans le navigateur
        const h1 = document.querySelector('h1');
        const p = document.querySelector('p');

        // Charger le texte sauvegardé
        if (localStorage.getItem('titre')) {
            h1.textContent = localStorage.getItem('titre');
        }
        if (localStorage.getItem('texte')) {
            p.textContent = localStorage.getItem('texte');
        }

        // Sauvegarder quand vous modifiez
        h1.addEventListener('blur', () => {
            localStorage.setItem('titre', h1.textContent);
        });

        p.addEventListener('blur', () => {
            localStorage.setItem('texte', p.textContent);
        });
    </script>
</body>
</html>
