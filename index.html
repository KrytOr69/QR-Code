<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Téléchargement simple</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; max-width: 900px; text-align: center; }
    h1 { margin-bottom: 20px; }
    .buttons { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    button { padding: 15px 30px; font-size: 16px; cursor: pointer; border: 2px solid #333; background: #f0f0f0; border-radius: 8px; }
    button:hover { background: #ddd; }
  </style>
</head>
<body>
  <h1>Télécharge ce que tu veux</h1>
  
  <div class="buttons">
    <button id="downloadImage" type="button">📥 Télécharger image</button>
    <button id="downloadTexte" type="button">📝 Télécharger texte</button>
    <button id="downloadQR" type="button">🔲 Télécharger QR Code</button>
  </div>

  <script>
    const downloadImage = document.getElementById("downloadImage");
    const downloadTexte = document.getElementById("downloadTexte");
    const downloadQR = document.getElementById("downloadQR");

    // Télécharger image
    downloadImage.addEventListener("click", () => {
      const link = document.createElement("a");
      link.href = "image.jpg";
      link.download = "mon-image.jpg";
      link.click();
    });

    // Télécharger texte
    downloadTexte.addEventListener("click", () => {
      const text = prompt("Écris le texte à télécharger :");
      if (text !== null) {
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "mon-texte.txt";
        link.click();
      }
    });

    // Télécharger QR Code
    downloadQR.addEventListener("click", () => {
      const link = document.createElement("a");
      link.href = "qr-code.png";
      link.download = "mon-qr-code.png";
      link.click();
    });
  </script>
</body>
</html>
